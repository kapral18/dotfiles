<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820" role="img" aria-labelledby="title desc">
  <title id="title">Agent-review end-to-end phase order</title>
  <desc id="desc">The controller routes and scopes, optionally runs PR necessity or intent audit first, launches parallel registry-model angle lanes plus the blind fresh-eyes lane, adversarially verifies merged candidates on a cross-family model, runs live UI when applicable, audits findings, judges, acts, and then runs post-act verification whenever the working tree was edited.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker>
    <style>
      .bg{fill:#0f172a}.phase{fill:#1e293b;stroke:#7dd3fc;stroke-width:2;rx:16}.gate{fill:#3b0764;stroke:#d8b4fe;stroke-width:2;rx:16}.stop{fill:#451a1a;stroke:#fca5a5;stroke-width:2;rx:16}.act{fill:#052e2b;stroke:#5eead4;stroke-width:2;rx:16}.title{fill:#f8fafc;font:700 28px system-ui,sans-serif}.text{fill:#f8fafc;font:650 22px system-ui,sans-serif}.small{fill:#cbd5e1;font:500 17px system-ui,sans-serif}.line{stroke:#7dd3fc;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#fca5a5;stroke-width:3;fill:none;marker-end:url(#arrow);stroke-dasharray:8 8}
    </style>
  </defs>
  <rect class="bg" width="1500" height="820" rx="24"/>
  <text class="title" x="48" y="58">/agent-review: strict blocking phases</text>
  <text class="small" x="48" y="88">Workers investigate. The controller aggregates, judges, reconciles, and performs any gated side effect.</text>
  <rect class="phase" x="70" y="150" width="230" height="116"/>
  <text class="text" x="100" y="190">1. Route + scope</text><text class="small" x="100" y="220">mode, authorship,</text><text class="small" x="100" y="246">PR/diff, constraints</text>
  <path class="line" d="M300 208 H380"/>
  <rect class="gate" x="380" y="136" width="250" height="144"/>
  <text class="text" x="415" y="184">2. PR necessity</text><text class="small" x="415" y="214">or intent audit</text><text class="small" x="415" y="240">when route requires</text>
  <path class="line" d="M630 208 H710"/>
  <rect class="phase" x="710" y="136" width="250" height="144"/>
  <text class="text" x="745" y="184">3-4. Reviewers + verify</text><text class="small" x="745" y="214">session-model angle lanes (+ fresh-eyes)</text><text class="small" x="745" y="240">registry models; cross-family refutation</text>
  <path class="line" d="M960 208 H1040"/>
  <rect class="phase" x="1040" y="136" width="250" height="144"/>
  <text class="text" x="1075" y="184">5. Live UI</text><text class="small" x="1075" y="214">only if applicable</text><text class="small" x="1075" y="240">selected target packet</text>
  <path class="line" d="M1165 280 V360"/>
  <rect class="phase" x="1040" y="360" width="250" height="128"/>
  <text class="text" x="1075" y="405">6. Findings audit</text><text class="small" x="1075" y="435">inline when trivial,</text><text class="small" x="1075" y="461">delegated when not</text>
  <path class="line" d="M1040 424 H950"/>
  <rect class="gate" x="700" y="360" width="250" height="128"/>
  <text class="text" x="735" y="405">7-8. Aggregate + judge</text><text class="small" x="735" y="435">dedupe, truth filter,</text><text class="small" x="735" y="461">severity, reconciliation</text>
  <path class="line" d="M700 424 H610"/>
  <rect class="act" x="360" y="360" width="250" height="128"/>
  <text class="text" x="395" y="405">9. Act phase</text><text class="small" x="395" y="435">fix if fix_authorized,</text><text class="small" x="395" y="461">else draft only</text>
  <path class="line" d="M360 424 H320"/>
  <rect class="act" x="70" y="360" width="250" height="128"/>
  <text class="text" x="100" y="405">10. Post-act verify</text><text class="small" x="100" y="435">only if worktree edited:</text><text class="small" x="100" y="461">gates + fix-diff lens</text>
  <path class="dash" d="M505 280 V330"/>
  <rect class="stop" x="344" y="560" width="320" height="130"/>
  <text class="text" x="385" y="606">Stop path</text><text class="small" x="385" y="636">blocked, superseded,</text><text class="small" x="385" y="662">unclear, not needed</text>
  <path class="dash" d="M505 280 V560"/>
  <rect class="phase" x="710" y="560" width="320" height="130"/>
  <text class="text" x="750" y="606">Verification needed</text><text class="small" x="750" y="636">reviewers return it;</text><text class="small" x="750" y="662">controller runs serially</text>
  <path class="line" d="M835 280 V360"/>
  <path class="line" d="M860 560 V488"/>
  <text class="small" x="1058" y="630">UI screenshots are local handoff artifacts.</text>
  <text class="small" x="1058" y="656">They are not uploaded by the API.</text>
</svg>
