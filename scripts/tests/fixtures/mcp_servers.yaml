mcp_servers:
  - name: public-tool
    work_only: false
    command: docker
    args:
      - run
      - "--rm"
      - "-i"
      - public/image
    codex_default_tools_approval_mode: approve
    codex_tool_approval_modes:
      read: approve
      write: prompt

  - name: work-tool
    work_only: true
    command: bash
    args:
      - "-lc"
      - 'echo "hello from work"'

  - name: http-tool
    work_only: false
    type: http
    url: https://mcp.example.com/mcp
    oauth_by_tool:
      claude:
        clientId: "$(echo resolved-client-id)"
        callbackPort: 3118
      cursor:
        clientId: "$(echo cursor-client-id)"
      copilot:
        clientId: "copilot-client-id"
        callbackPort: 4242
        scopes: "openid, email"
      codex:
        tokenBridge: "http-tool"

  - name: bridge-tool
    work_only: false
    type: http
    url: https://mcp.bridge.com/mcp
    oauth_by_tool:
      copilot:
        tokenBridge: "bridge-source"
      codex:
        tokenBridge: "bridge-source"
