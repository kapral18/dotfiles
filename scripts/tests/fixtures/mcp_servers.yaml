mcp_servers:
  - name: public-tool
    work_only: false
    command: docker
    args:
      - run
      - "--rm"
      - "-i"
      - public/image
    codex_default_tools_approval_mode: approve
    codex_tool_approval_modes:
      read: approve
      write: prompt

  - name: work-tool
    work_only: true
    command: bash
    args:
      - "-lc"
      - 'echo "hello from work"'

  - name: http-tool
    work_only: false
    type: http
    url: https://mcp.example.com/mcp
    oauth_by_tool:
      claude:
        clientId: "$(echo resolved-client-id)"
        callbackPort: 3118
      cursor:
        clientId: "$(echo cursor-client-id)"
      copilot:
        clientId: "copilot-client-id"
        callbackPort: 4242
        scopes: "openid, email"
      codex:
        bearerTokenEnvVar: "CODEX_MCP_TOKEN_HTTP_TOOL"

  - name: header-tool
    work_only: false
    type: http
    url: https://mcp.header.com/mcp
    oauth_by_tool:
      copilot:
        headerAuth: "$(echo Bearer resolved-token)"
      codex:
        bearerTokenEnvVar: "CODEX_MCP_TOKEN_HEADER_TOOL"

  - name: stale-header-tool
    work_only: false
    type: http
    url: https://mcp.stale-header.com/mcp
    oauth_by_tool:
      copilot:
        headerAuth: "$(bash -lc 'echo stale token >&2; exit 7')"
