mcp_servers:
  - name: public-tool
    work_only: false
    command: docker
    args:
      - run
      - "--rm"
      - "-i"
      - public/image

  - name: work-tool
    work_only: true
    command: bash
    args:
      - "-lc"
      - 'echo "hello from work"'

  - name: http-tool
    work_only: false
    type: http
    url: https://mcp.example.com/mcp
    oauth:
      clientId: "$(echo resolved-client-id)"
      callbackPort: 3118
