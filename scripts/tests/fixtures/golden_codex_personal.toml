[model]
id = "test-model"

[mcp_servers.public-tool]
command = "docker"
args = [
  "run",
  "--rm",
  "-i",
  "public/image",
]
default_tools_approval_mode = "approve"

[mcp_servers.public-tool.tools.read]
approval_mode = "approve"

[mcp_servers.public-tool.tools.write]
approval_mode = "prompt"

[mcp_servers.http-tool]
command = ",mcp-token"
args = [
  "http-tool",
  "--bridge",
  "--url",
  "https://mcp.example.com/mcp",
]

[mcp_servers.bridge-tool]
command = ",mcp-token"
args = [
  "bridge-source",
  "--bridge",
  "--url",
  "https://mcp.bridge.com/mcp",
]
