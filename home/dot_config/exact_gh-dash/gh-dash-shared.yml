smartFilteringAtLaunch: false
defaults:
  preview:
    open: true
    width: 100
  prsLimit: 30
  issuesLimit: 30
  view: prs
  layout:
    prs:
      updatedAt:
        width: 7
      repo:
        width: 15
      author:
        width: 15
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 16
    issues:
      updatedAt:
        width: 7
      repo:
        width: 15
      creator:
        width: 10
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
repoPaths:
  elastic/kibana: ~/work/kibana
  elastic/*: ~/work/*
  :owner/:repo: ~/code/:repo
theme:
  ui:
    table:
      showSeparator: true
      compact: false
confirmQuit: false

keybindings:
  prs:
    - key: C
      name: "worktree: checkout + focus"
      command: $HOME/.config/gh-dash/scripts/pr_action.sh focus "{{ `{{.RepoName}}` }}" "{{ `{{.RepoPath}}` }}" "{{ `{{.PrNumber}}` }}"
    - key: " "
      name: "worktree: checkout + focus"
      command: $HOME/.config/gh-dash/scripts/pr_action.sh focus "{{ `{{.RepoName}}` }}" "{{ `{{.RepoPath}}` }}" "{{ `{{.PrNumber}}` }}"
    - key: ctrl+t
      name: "worktree: create (background)"
      command: $HOME/.config/gh-dash/scripts/pr_action.sh create_bg "{{ `{{.RepoName}}` }}" "{{ `{{.RepoPath}}` }}" "{{ `{{.PrNumber}}` }}"

    - key: b
      name: "octo: review (worktree + focus)"
      command: $HOME/.config/gh-dash/scripts/pr_action.sh octo_review "{{ `{{.RepoName}}` }}" "{{ `{{.RepoPath}}` }}" "{{ `{{.PrNumber}}` }}"

  issues:
    - key: C
      name: "worktree: checkout + focus"
      command: $HOME/.config/gh-dash/scripts/issue_action.sh focus "{{ `{{.RepoName}}` }}" "{{ `{{.RepoPath}}` }}" "{{ `{{.IssueNumber}}` }}"
    - key: " "
      name: "worktree: checkout + focus"
      command: $HOME/.config/gh-dash/scripts/issue_action.sh focus "{{ `{{.RepoName}}` }}" "{{ `{{.RepoPath}}` }}" "{{ `{{.IssueNumber}}` }}"
