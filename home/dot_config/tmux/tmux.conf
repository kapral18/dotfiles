# TPM plugins
set -g @plugin '27medkamal/tmux-session-wizard'
set -g @plugin 'kapral18/tmux-theme-catppuccin'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-fzf-url'

# Catpuccin
set -g @catppuccin_flavor 'frappe'

# Thumbs
set -g @thumbs-key 'C-t'
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-alphabet 'qwerty-left-hand'
set -g @thumbs-reverse enabled
set -g @thumbs-contrast 1
set -g @thumbs-upcase-command 'echo -n {} | pbcopy'

# Continuum
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'wezterm,fullscreen'
set -g @continuum-save-interval '1'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# tpm overrides

# Override tmux-pain-control because >< don't work
unbind-key >
unbind-key <
unbind-key C-h
unbind-key C-l

bind-key s switch-client -T k18
# <prefix>sh to swap left
bind-key -T k18 h swap-pane -d -t -1
# <prefix>sl to swap right
bind-key -T k18 l swap-pane -d -t +1
set -g default-terminal "tmux-256color"
set -as terminal-features 'xterm*:extkeys'
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",*256col*:Tc" # true color support
set -ga terminal-overrides ',xterm*:smcup@:rmcup@' # allow scrollback with mouse/trackpad
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[ q' # blinking cursor?
set -ga terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -ga terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours -
set -g mouse on
set -gq allow-passthrough on
set -g visual-activity off
set -g renumber-windows on
set -g history-limit 50000
# Update files on focus (using for vim)
set -g focus-events on
set -g -s set-clipboard on

# set vi-mode
set-window-option -g mode-keys vi

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# No confirm to kill
bind-key & kill-window
bind-key x kill-pane

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Shift F to toggle max-pane
unbind-key z 
unbind-key f
bind-key f resize-pane -Z

# Reload config
bind r source-file ~/.config/tmux/tmux.conf

# History and renaming
set -g history-limit 10000
set -g allow-rename off

# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
