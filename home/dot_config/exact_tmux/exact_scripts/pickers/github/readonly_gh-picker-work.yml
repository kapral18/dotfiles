prSections:
  - title: "Action: PRs awaiting your review"
    scopes: [focus]
    filters: >-
      is:open is:pr
      review-requested:@me
      org:elastic
      -is:draft
      -author:@me
      -team-review-requested:elastic/kibana-management

  - title: "Mine: Your open PRs"
    scopes: [focus]
    filters: >-
      is:open is:pr
      author:@me
      org:elastic

  - title: "Watching: Team review queue"
    scopes: [explore]
    filters: >-
      is:open is:pr
      team-review-requested:elastic/kibana-management
      org:elastic
      -is:draft
      -author:@me

  - title: "Watching: PRs involving you"
    scopes: [explore]
    filters: >-
      is:open is:pr
      involves:@me
      org:elastic
      -author:@me
      -is:draft
      -review-requested:@me
      -reviewed-by:@me
      -team-review-requested:elastic/kibana-management

  - title: "Maintenance: Pending backports"
    scopes: [focus]
    source: backport-failures
    filters: >-
      is:pr is:merged
      author:@me
      org:elastic

issuesSections:
  - title: "Action: Issues assigned to you"
    scopes: [focus]
    filters: >-
      is:open is:issue
      assignee:@me
      org:elastic

  - title: "Mine: Your open issues"
    scopes: [focus]
    filters: >-
      is:open is:issue
      author:@me
      org:elastic
      -assignee:@me

  - title: "Watching: Failed test radar"
    scopes: [explore]
    filters: >-
      is:open is:issue
      label:"failed-test"
      org:elastic
      label:"Team:Kibana Management"

  - title: "Watching: Issue mentions and involves"
    scopes: [explore]
    filters: >-
      is:open is:issue
      involves:@me
      org:elastic
      -assignee:@me
      -author:@me

repoPaths:
  elastic/kibana: ~/work/kibana
  elastic/*: ~/work/*
  :owner/:repo: ~/code/:repo
