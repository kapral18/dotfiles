prSections:
  - title: "Action: PRs awaiting your review"
    scopes: [focus]
    filters: >-
      is:open is:pr
      review-requested:@me
      -org:elastic
      -is:draft
      -author:@me

  - title: "Mine: Your open PRs"
    scopes: [focus]
    filters: >-
      is:open is:pr
      author:@me
      -org:elastic

  - title: "Watching: PRs involving you"
    scopes: [explore]
    filters: >-
      is:open is:pr
      involves:@me
      -org:elastic
      -author:@me
      -is:draft
      -review-requested:@me
      -reviewed-by:@me

issuesSections:
  - title: "Action: Issues assigned to you"
    scopes: [focus]
    filters: >-
      is:open is:issue
      assignee:@me
      -org:elastic

  - title: "Mine: Your open issues"
    scopes: [focus]
    filters: >-
      is:open is:issue
      author:@me
      -org:elastic
      -assignee:@me

  - title: "Watching: Issue mentions and involves"
    scopes: [explore]
    filters: >-
      is:open is:issue
      involves:@me
      -org:elastic
      -assignee:@me
      -author:@me

repoPaths:
  elastic/kibana: ~/work/kibana
  elastic/*: ~/work/*
  :owner/:repo: ~/code/:repo
