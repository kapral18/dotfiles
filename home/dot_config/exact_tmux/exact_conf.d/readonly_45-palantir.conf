# ,palantir tmux surface (sourced after the theme so the status append survives).

# The seeing stone (prefix + A). A is unbound in stock tmux; safe to claim —
# it previously belonged to a retired dashboard. Full-window popup
# running the Textual dashboard through uv (PEP 723 deps; nothing globally
# installed). The popup job inherits $TMUX from the owning server, so drill-in
# (switch-client) targets this server without extra plumbing; OUTER_TMUX_SOCKET
# stays a nested-server override (tmux formats are NOT expanded in popup
# shell-commands, so never pass #{socket_path} here).
bind-key A popup -E -w 90% -h 85% -T " palantír " \
  "uv run $HOME/lib/,palantir/dashboard.py"

# Status segment: P:n in-flight · H:n holding · C:n cleared_for_human (empty
# until a legion exists). Idempotent — won't duplicate when re-sourced.
if-shell -F '#{!=:#{m:*palantir statusline*,#{status-right}},1}' \
  'set-option -ga status-right " #[fg=colour246]#(,palantir statusline 2>/dev/null)#[default]"'
