# Ralph control plane.

# Dashboard popup (prefix + A).
# A is unbound in stock tmux; safe to claim. Use the palette
# (prefix+r -> ralph:*) or the dashboard's own alt-N / ctrl-n
# bindings for new runs — we deliberately don't grab any other
# top-level prefix keys here to avoid clobbering reload (prefix+R)
# or the palette (prefix+r).
bind-key A display-popup -w 95% -h 85% -E "$HOME/.local/bin/ralph-tui"

# Status segment: shows R:n (running), V:n (needs verification).
# Idempotent — won't duplicate when the file is sourced more than once.
if-shell -F '#{!=:#{m:*ralph statusline*,#{status-right}},1}' \
  'set-option -ga status-right " #[fg=#fab387]#(,ralph statusline 2>/dev/null)#[default]"'
