# Agent prompt wrap.
#
# Intercepts Alt-Enter when the active pane is running an AI coding agent
# (claude / cursor-agent / pi) and the wrap toggle is on. Prepends a
# calibrated verification scaffold to whatever the user typed, then submits
# (with a real Enter).
#
# Plain Enter is never touched. Alt-Enter is passed through untouched in:
#   - non-agent panes (shells, vim, etc.)
#   - agent panes when the toggle is OFF (toggle with <prefix>W)
#
# Storage:
#   prefix text:  ~/.config/tmux/agent_prompts/prefix.txt
#   handler:      ~/.config/tmux/scripts/agent_prompt_wrap/handle_enter.sh
#   toggle:       ~/.config/tmux/scripts/agent_prompt_wrap/toggle.sh

# Default state: ON.
set -g @agent-wrap "1"

# Synchronous run-shell (no -b) so a rapid second Alt-Enter cannot race the
# first script's send-keys. The handler is fast (~50ms): one ps + a few
# send-keys.
bind-key -n M-Enter run-shell "$HOME/.config/tmux/scripts/agent_prompt_wrap/handle_enter.sh '#{pane_id}'"

# Toggle wrap on/off (default keybind: <prefix>W).
bind-key W run-shell -b "$HOME/.config/tmux/scripts/agent_prompt_wrap/toggle.sh"
