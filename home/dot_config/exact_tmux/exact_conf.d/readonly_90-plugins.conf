# Kill stale gh-dash popup server so tmux-continuum's
# "another tmux server running" check doesn't block session restore.
run-shell 'tmux -L gh-dash-popup kill-server 2>/dev/null; true'

# TPM plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'kapral18/tmux-theme-catppuccin'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Resurrect
set -g @resurrect_keep_sessions '10'
set -g @resurrect-hook-post-save-all "$HOME/.config/tmux/scripts/resurrect/resurrect_keep_last_sessions.sh"
set -g @resurrect-hook-pre-restore-all "$HOME/.config/tmux/scripts/resurrect/resurrect_keep_last_sessions.sh"
set -g @resurrect-hook-post-restore-all "tmux run-shell -b 'sleep 1; $HOME/.config/tmux/scripts/pickers/session/index_update.sh --force --quiet --skip-dirty --skip-gh; PICK_SESSION_THREADS=1 $HOME/.config/tmux/scripts/pickers/session/index_update.sh --force --quiet'"

# Catpuccin
set -g @catppuccin_flavor 'frappe'

# Continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
