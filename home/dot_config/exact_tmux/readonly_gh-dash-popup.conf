set -g prefix C-Space
unbind C-b
bind-key C-Space send-prefix

# Minimal status bar showing the active dashboard (work / home).
set -g status on
set -g status-position top
set -g status-style "bg=default,fg=brightblack"
set -g status-left " #[fg=white,bold]#{session_name}#[default] "
set -g status-left-length 20
set -g status-right " Tab=switch  q=hide "
set -g status-right-length 30
set -g status-justify left
set -g window-status-format ""
set -g window-status-current-format ""

# Toggle between work / home dashboards.
bind-key -n Tab switch-client -n

# Detach (hide popup) without quitting gh-dash.
bind-key -n q detach-client
bind-key -n C-c detach-client
bind-key G detach-client
