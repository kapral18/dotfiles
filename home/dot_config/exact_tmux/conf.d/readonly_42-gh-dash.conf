# GitHub picker popup (fzf-based, replaces gh-dash)
#
# Opens a fzf picker showing PRs/issues from gh-dash config sections.
# Uses the same search filters as gh-dash but runs natively in fzf.
bind-key G run-shell -b "$HOME/.config/tmux/scripts/pick_session/gh_popup.sh"

