# gh-dash popup (GitHub dashboard)
#
# Opens a persistent `gh dash` instance in a large popup rooted at the current pane path.
# Hide the popup with `q`, `C-c`, or `prefix` + `G` (gh-dash stays running).
bind-key G run-shell -b "$HOME/.config/tmux/scripts/gh_dash_popup.sh #{q:pane_current_path}"

# Restart (kill the nested gh-dash tmux server) if it gets wedged.
bind-key C-g run-shell "$HOME/.config/tmux/scripts/gh_dash_popup_restart.sh"
