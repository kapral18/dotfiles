# Repo bootstrap popup (fork + clone + tmux session)
#
# Prompts for <owner/repo> and runs `,gh-tfork` which decides ~/work vs ~/code.
bind-key B run-shell -b "$HOME/.config/tmux/scripts/gh_tfork_popup.sh"

# Popup sizing (absolute tmux cells/lines).
set -g @gh_tfork_popup_width '90'
set -g @gh_tfork_popup_height '3'

