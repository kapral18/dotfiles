# Picker popups + picker-specific options.

# URL picker (bindings)
bind-key u run-shell -b "$HOME/.config/tmux/scripts/pick_url.sh"

# URL picker (options)
set -g @pick_url_popup 'center,60%,35%'

# Session picker (bindings)
bind-key T run-shell -b "$HOME/.config/tmux/scripts/pick_session_popup.sh"

# Session picker (options)
set -g @pick_session_popup_width '60'
set -g @pick_session_popup_height '70'
# set -g @pick_session_pre_refresh 'on'  # optional: run cache update before fzf (default off for snappy popup)
# set -g @pick_session_filter_passthrough_rows '2000'  # optional: skip heavy regrouping for very large cached lists
# set -g @pick_session_reorder_after_open 'on'  # optional fallback: when ordered cache is stale, reorder via filter after open
# set -g @pick_session_reorder_after_open_delay_ms '180'  # optional delay before fallback background reorder reload
set -g @pick_session_dir_exclude_file '~/.config/tmux/pick_session_dir_exclude.txt'

# Finish setup for sessions created in bulk mode (placeholder panes) when you
# actually enter them (spawn shell + 2-pane layout).
set-hook -g client-session-changed "run-shell -b \"$HOME/.config/tmux/scripts/pick_session_on_session_switch.sh '#{session_name}'\""

# Keep the picker cache correct when sessions are created/renamed outside the picker.
# This hook is debounced (and skipped during bulk picker creates) to keep session
# creation/switching snappy.
set-hook -g after-new-session "run-shell -b \"$HOME/.config/tmux/scripts/pick_session_index_update_hook.sh\""
set-hook -g after-rename-session "run-shell -b \"$HOME/.config/tmux/scripts/pick_session_index_update_hook.sh\""
