# Canonical MCP server registry.
# Single source of truth for Cursor, Claude Code, Gemini, and Pi MCP configs.
#
# Each entry:
#   name        – server key in the mcpServers object
#   work_only   – true = only included when isWork is set
#   command     – executable to run
#   args        – argument list passed to the command

mcp_servers:
  - name: sequentialthinking
    work_only: false
    command: docker
    args:
      - run
      - "--pull=always"
      - "--rm"
      - "-i"
      - "--init"
      - mcp/sequentialthinking

  # Official hosted Semantic Code Search (Elastic SSO OAuth2). Replaces the
  # former self-hosted stdio scsi-main. On first use the client prompts for the
  - name: scsi-main
    work_only: true
    type: http
    url: https://semantic-code-search.elastic.dev/mcp
    oauth_by_tool:
      claude:
        callbackPort: 12345
        clientId: "0oa1aviou3pe7dITS1t8"
        scope: "user"
      cursor:
        ideClientId: "0oa1aviou3pe7dITS1t8"
        clientId: "0oa1aviou3pe7dITS1t8"
        scopes: "user"
      gemini:
        clientId: "0oa1aviou3pe7dITS1t8"
        callbackPort: 12345
        # Okta authz server only configures openid/email/offline_access; the
        # legacy "user" scope is rejected with error=invalid_scope.
        scopes: "openid, email, offline_access"
        # gemini-cli's local callback listener hardcodes the /oauth/callback
        # path (404 on anything else) and ignores this redirectUri for the
        # listener, so the request path MUST be /oauth/callback to match it.
        # Plain http (not https) is required: gemini-cli only serves http on
        # localhost. This is correct-by-construction but only completes once
        # the Okta SCSI app registers http://localhost:12345/oauth/callback as
        # a Login redirect URI (currently it only allows .../callback).
        redirectUri: "http://localhost:{port}/oauth/callback"
      pi:
        # Pre-registered public client (no DCR). pi derives the callback
        # listener from redirectUri; /callback matches the Okta app.
        clientId: "0oa1aviou3pe7dITS1t8"
        scopes: "openid, email, offline_access"
        redirectUri: "http://localhost:12345/callback"

  - name: scsi-local
    work_only: true
    command: bash
    args:
      - "-lc"
      - 'cd "$HOME/work/semantic-code-search-mcp-server/main" && ELASTICSEARCH_CLOUD_ID="$(pass scsi/k18/cloud_id)" ELASTICSEARCH_API_KEY="$(pass scsi/k18/api_key)" ELASTICSEARCH_INDEX=scsi-repo node dist/src/mcp_server/bin.js stdio'

  - name: slack
    work_only: true
    type: http
    url: https://mcp.slack.com/mcp
    oauth_by_tool:
      claude:
        clientId: "1601185624273.8899143856786"
        callbackPort: 3118
      cursor:
        ideClientId: "3660753192626.8903469228982"
        callbackPort: 8787
        clientId: "$(pass slack/mcp/client_id)"
        clientSecret: "$(pass slack/mcp/client_secret)"
        authorizationUrl: "https://slack.com/oauth/v2_user/authorize"
        tokenUrl: "https://slack.com/api/oauth.v2.user.access"
        issuer: "https://slack.com"
        scopes: "$(pass slack/mcp/user_scopes)"
      gemini:
        clientId: "$(pass slack/mcp/client_id)"
        clientSecret: "$(pass slack/mcp/client_secret)"
        callbackPort: 3118
        authorizationUrl: "https://slack.com/oauth/v2_user/authorize"
        tokenUrl: "https://slack.com/api/oauth.v2.user.access"
        issuer: "https://slack.com"
        scopes: "$(pass slack/mcp/user_scopes)"
      pi:
        # Reuse Claude's public client (no secret); the $(pass slack/mcp/*)
        # confidential client is not authorized for this user. Endpoints are
        # auto-discovered from the server's protected-resource metadata.
        clientId: "1601185624273.8899143856786"
        scopes: "$(pass slack/mcp/user_scopes)"
        # http:// localhost required; must match a registered redirect URI.
        redirectUri: "http://localhost:3118/callback"
