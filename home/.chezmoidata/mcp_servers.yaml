# Canonical MCP server registry.
# Single source of truth for every generated harness MCP config.
#
# Each entry:
#   name        – server key in the mcpServers object
#   work_only   – true = only included when isWork is set
#   command     – executable to run
#   args        – argument list passed to the command

mcp_servers:
  # Official hosted Semantic Code Search (Elastic SSO OAuth2). On first use,
  # supported clients prompt for OAuth and cache the resulting token locally.
  - name: scsi-main
    work_only: true
    type: http
    url: https://semantic-code-search.elastic.dev/mcp
    oauth_by_tool:
      claude:
        callbackPort: 12345
        clientId: "0oa1aviou3pe7dITS1t8"
        scope: "user"
      cursor:
        # Runtime transport is the shared ,mcp-token --bridge (same mid-session
        # recovery as Copilot/Codex). OAuth minting stays on a dedicated mint
        # workspace whose project mcp.json keeps these client fields so
        # cursor-agent mcp list-tools/login can still run the Okta refresh and
        # authorization_code flows (project config wins over user bridge).
        ideClientId: "0oa1aviou3pe7dITS1t8"
        clientId: "0oa1aviou3pe7dITS1t8"
        scopes: "user"
        tokenBridge: "scsi-main"
        retryConnectTimeouts: true
      gemini:
        clientId: "0oa1aviou3pe7dITS1t8"
        callbackPort: 12345
        # Okta authz server only configures openid/email/offline_access; the
        # legacy "user" scope is rejected with error=invalid_scope.
        scopes: "openid, email, offline_access"
        # gemini-cli's local callback listener hardcodes the /oauth/callback
        # path (404 on anything else) and ignores this redirectUri for the
        # listener, so the request path MUST be /oauth/callback to match it.
        # Plain http (not https) is required: gemini-cli only serves http on
        # localhost. This is correct-by-construction but only completes once
        # the Okta SCSI app registers http://localhost:12345/oauth/callback as
        # a Login redirect URI (currently it only allows .../callback).
        redirectUri: "http://localhost:{port}/oauth/callback"
      pi:
        # Pre-registered public client (no DCR). pi derives the callback
        # listener from redirectUri; /callback matches the Okta app.
        clientId: "0oa1aviou3pe7dITS1t8"
        scopes: "openid, email, offline_access"
        redirectUri: "http://localhost:12345/callback"
      copilot:
        # Copilot CLI cannot run the SCSI Okta flow itself: it hardcodes its
        # OAuth redirect to http://127.0.0.1:{port}/ (only the port is
        # configurable via auth.redirectPort), which the SCSI Okta app
        # 0oa1aviou3pe7dITS1t8 rejects (verified: HTTP 400 "redirect_uri must
        # be a Login redirect URI" — only .../callback and .../oauth/callback
        # are registered).
        #
        # Instead, ride the rotating token cursor-cli already minted via its
        # confidential Okta authorization_code flow. tokenBridge spawns
        # ",mcp-token scsi-main --bridge --url <this url>" as a local stdio
        # MCP server that injects a freshly selected bearer per request, so a
        # Copilot session outlives any single token: SCSI tokens expire after
        # ~1h (expires_in=3600) and the bridge rotates behind the seam via
        # cursor's refresh grant instead of dying with a launch-time capture.
        tokenBridge: "scsi-main"
        # The hosted ingress intermittently returns an Envoy connection-timeout
        # 503 before a request reaches SCSI. All SCSI tools are read-only, so
        # retrying that exact transport failure once is safe.
        retryConnectTimeouts: true
      codex:
        # Codex can run streamable HTTP MCP natively, but its native OAuth
        # client has the same redirect/client-registration mismatch as
        # Copilot for this Okta app. Its bearer_token_env_var support reads
        # the env var once at launch and never reloads it, so sessions died
        # with the captured token; spawn the same per-request stdio bridge
        # Copilot uses instead.
        tokenBridge: "scsi-main"
        retryConnectTimeouts: true
    codex_default_tools_approval_mode: approve

  - name: scsi-local
    work_only: true
    command: bash
    args:
      - "-lc"
      - 'cd "$HOME/work/semantic-code-search-mcp-server/main" && ELASTICSEARCH_CLOUD_ID="$(pass scsi/k18/cloud_id)" ELASTICSEARCH_API_KEY="$(pass scsi/k18/api_key)" ELASTICSEARCH_INDEX=scsi-repo node dist/src/mcp_server/bin.js stdio'
    codex_default_tools_approval_mode: approve

  - name: slack
    work_only: true
    type: http
    url: https://mcp.slack.com/mcp
    oauth_by_tool:
      claude:
        clientId: "1601185624273.8899143856786"
        callbackPort: 3118
      cursor:
        # Bridge for mid-session recovery; OAuth client fields feed the mint
        # workspace used by ,mcp-token silent rotate / browser login.
        ideClientId: "3660753192626.8903469228982"
        tokenBridge: "slack"
      gemini:
        clientId: "1601185624273.8899143856786"
        callbackPort: 3118
        redirectUri: "http://localhost:3118/callback"
        scopes: "$(pass slack/mcp/user_scopes)"
      pi:
        # Reuse Claude's public client (no secret); the custom confidential client
        # is not authorized for this user. Endpoints are auto-discovered.
        clientId: "1601185624273.8899143856786"
        scopes: "$(pass slack/mcp/user_scopes)"
        # http:// localhost required; must match a registered redirect URI.
        redirectUri: "http://localhost:3118/callback"
      copilot:
        # Copilot CLI cannot run Slack's OAuth flow itself: it hardcodes its
        # redirect to http://127.0.0.1:{port}/ (only the port is configurable),
        # Slack's MCP authorization server offers no dynamic client
        # registration, and its token endpoint requires a client secret
        # (token_endpoint_auth_methods = [client_secret_post]; grant_types =
        # [authorization_code, refresh_token]) — verified against
        # https://mcp.slack.com/.well-known/oauth-authorization-server.
        #
        # Instead, ride the rotating user token cursor-cli already minted: it
        # runs the confidential authorization_code flow and refreshes the token
        # in place. tokenBridge spawns ",mcp-token slack --bridge --url <this
        # url>" as a local stdio MCP server injecting a freshly selected
        # bearer per request (Slack MCP bearer_methods_supported = [header]),
        # so the session outlives Slack's 12h tokens; cursor's browser flow is
        # last.
        tokenBridge: "slack"
      codex:
        # Codex's bearer_token_env_var reads the env once at launch and never
        # reloads it; spawn the same per-request stdio bridge Copilot uses.
        tokenBridge: "slack"
    codex_tool_approval_modes:
      slack_read_canvas: approve
      slack_read_channel: approve
      slack_read_thread: approve
      slack_read_user_profile: approve
      slack_search_channels: approve
      slack_search_public: approve
      slack_search_public_and_private: approve
      slack_search_users: approve
