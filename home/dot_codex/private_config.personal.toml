#:schema https://developers.openai.com/codex/config-schema.json

approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "cached"
check_for_update_on_startup = true
personality = "pragmatic"
model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"
service_tier = "default"

# __MCP_SERVERS__

[features]
multi_agent = true
js_repl = true
prevent_idle_sleep = true
# ai-kb is the sole durable semantic store (see docs/topics/ai-assistants/knowledge-base.md);
# pin codex's experimental auto-memory off so a default flip can't create a second one.
memories = false
