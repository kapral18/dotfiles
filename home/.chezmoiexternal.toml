[".config/tmux/plugins/tpm"]
type = "git-repo"
url = "https://github.com/tmux-plugins/tpm"
refreshPeriod = "168h"

[".hammerspoon/Spoons"]
type = "archive"
url = "https://github.com/Hammerspoon/Spoons/archive/refs/heads/master.tar.gz"
stripComponents = 2
include = ["*/Source/EmmyLua.spoon/**"]
refreshPeriod = "168h"
exact = true

["Library/Application Support/lowfi"]
type = "archive"
url = "https://github.com/talwat/lowfi/archive/refs/heads/main.tar.gz"
stripComponents = 2
include = ["*/data/*.txt"]
refreshPeriod = "24h"

[".config/bat/themes"]
type = "archive"
url = "https://github.com/catppuccin/bat/archive/refs/heads/main.tar.gz"
stripComponents = 2
include = ["*/themes/*"]
exact = true
refreshPeriod = "168h"

[".config/yazi/flavors"]
type = "archive"
url = "https://github.com/yazi-rs/flavors/archive/refs/heads/main.tar.gz"
stripComponents = 1
include = [
  "*/catppuccin-frappe.yazi/**",
  "*/catppuccin-latte.yazi/**",
]
refreshPeriod = "168h"
