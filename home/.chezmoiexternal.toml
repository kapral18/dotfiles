# All archive externals use codeload.github.com directly: the
# github.com/<owner>/<repo>/archive/... front-end intermittently 504s
# (verified 2026-07-09) while codeload — the backend it redirects to —
# serves the identical <repo>-<branch>/ tarball.

[".config/tmux/plugins/tpm"]
type = "git-repo"
url = "https://github.com/tmux-plugins/tpm"
refreshPeriod = "168h"

[".hammerspoon/Spoons"]
type = "archive"
url = "https://codeload.github.com/Hammerspoon/Spoons/tar.gz/refs/heads/master"
stripComponents = 2
include = ["*/Source/EmmyLua.spoon/**"]
refreshPeriod = "168h"
exact = true

["Library/Application Support/lowfi"]
type = "archive"
url = "https://codeload.github.com/talwat/lowfi/tar.gz/refs/heads/main"
stripComponents = 2
include = ["*/data/*.txt"]
refreshPeriod = "24h"

[".config/bat/themes"]
type = "archive"
url = "https://codeload.github.com/catppuccin/bat/tar.gz/refs/heads/main"
stripComponents = 2
include = ["*/themes/*"]
exact = true
refreshPeriod = "168h"

[".config/yazi/flavors"]
type = "archive"
url = "https://codeload.github.com/yazi-rs/flavors/tar.gz/refs/heads/main"
stripComponents = 1
include = [
  "*/catppuccin-frappe.yazi/**",
  "*/catppuccin-latte.yazi/**",
]
refreshPeriod = "168h"
