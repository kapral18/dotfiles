# RTK config — managed by chezmoi (source: home/Library/Application Support/rtk/config.toml).
# RTK reads dirs::config_dir()/rtk/config.toml; on macOS that is this path.
# RTK is treated as a RECOVERABLE INDEX, not a lossless substitute: most filters
# print "+N more" counts and tee full output on overflow. See the recovery rule
# in ~/AGENTS.md / ~/CLAUDE.md and docs/topics/ai-assistants/index.md.

[hooks]
# Auto-rewrite is broad by default. Exclude commands where a compacted view is
# either silently lossy or never worth the truncation:
#   - `gh pr view`   field-subsets the PR JSON, dropping review bodies / check
#                    identity WITHOUT an overflow count (LOSSY-SILENT)
#   - `gh pr checks` collapses individual check detail (LOSSY-SILENT)
#   - `git diff`     a truncated diff is never useful for review/judgment; we
#                    always want the complete hunks, so never compact it
#   - `git show`     same as diff — it embeds a full diff body
# `gh ... --json/--jq/--template` and `gh api` already pass through raw (registry.rs),
# and `git status/log` compact recoverably (overflow counts + tee), so they stay rewritten.
# Patterns without a leading `^` match the command head with a word boundary
# (RTK compiles them to `^<escaped>($|\s)`), so "git diff" matches "git diff --staged"
# but NOT "git diff-tree"/"git difftool" (a non-space char follows).
#
# `find`/`grep`/`rg` are excluded because RTK's compact reimplementations are
# LOSSY-SILENT or BROKEN, not recoverable (verified by dry-run + live probe,
# rtk 0.42.1):
#   - `find`  RTK's `find` subcommand models only -name/-type; it silently DROPS
#             -mindepth/-maxdepth/-print/-quit/-prune/-path with no overflow marker,
#             returning a different result set than native find.
#   - `grep`/`rg`  both rewrite to `rtk grep`, whose `-l` means --max-len (collides
#             with grep/rg's -l=--files-with-matches), and `rtk grep --files-with-matches .`
#             FALLS BACK to non-recursive system grep and errors "Is a directory".
# All three overlap with the agent's native Grep/Glob tools (which bypass RTK), so
# excluding them costs zero measured savings (`rtk gain` shows 0 tokens from any).
#
# `git log` is also LOSSY-SILENT (verified rtk 0.42.1, native-vs-rtk at scale):
# a bare `git log`/`git log --oneline` is silently capped at 50 commits with NO
# overflow marker (101 commits -> shows 50, stops, no "+N more"); an explicit
# `git log -N` overrides the cap. Truncating history with no signal can hide older
# relevant commits from review/judgment, same principle as the git diff/show
# exclusion. (`ls`/`read`/`tree`/`git status` were re-tested at 1000 files /
# 5000 lines / 40 modified and drop NOTHING — format-only compaction — so they
# stay rewritten.)
exclude_commands = [
  "gh pr view",
  "gh pr checks",
  "git diff",
  "git show",
  "git log",
  "find",
  "grep",
  "rg",
]

[tee]
# Save full raw output so anything RTK compacts is one fetch away.
# The [tee] table is all-or-nothing in rtk 0.42.1 (serde requires every field),
# so the two cap fields below carry rtk's own defaults verbatim.
enabled = true
# "always" (not the default "failures") so even SUCCESSFUL long output is
# recoverable — TOML-based filters only tee on failure otherwise.
mode = "always"
max_files = 20
max_file_size = 1048576

[telemetry]
# No phone-home. (RTK defaults this to false; set explicitly for clarity.)
enabled = false
